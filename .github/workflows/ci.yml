name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff>=0.8.0
      - name: Lint
        run: cd backend && ruff check .
      - name: Format check
        run: cd backend && ruff format --check .

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agent_db
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent -d agent_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://agent:agent_dev@localhost:5432/agent_db
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: test-key-for-ci
      JWT_SECRET_KEY: ci-test-secret
      GUARDRAILS_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: cd backend && pip install -e ".[dev]"
      - name: Download spaCy model (required by Presidio for PII detection)
        run: python -m spacy download en_core_web_sm
      - name: Run tests
        run: cd backend && python -m pytest tests/ -v --tb=short

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Lint
        run: cd frontend && npx eslint .
      - name: Type check
        run: cd frontend && npx tsc --noEmit

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Build
        run: cd frontend && npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend
        run: docker build -t enterprise-mcp-backend ./backend
      - name: Build frontend
        run: docker build -t enterprise-mcp-frontend ./frontend
      - name: Build MCP servers
        run: |
          docker build -t mcp-github -f ./mcp_servers/github_server/Dockerfile ./mcp_servers
          docker build -t mcp-project-mgmt -f ./mcp_servers/project_management_server/Dockerfile ./mcp_servers
          docker build -t mcp-calendar -f ./mcp_servers/calendar_server/Dockerfile ./mcp_servers
