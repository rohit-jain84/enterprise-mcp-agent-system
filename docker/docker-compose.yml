version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_db}
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent} -d ${POSTGRES_DB:-agent_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  github-mcp:
    build:
      context: ../mcp_servers
      dockerfile: github_server/Dockerfile
    restart: unless-stopped
    ports:
      - "9001:8001"
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8001),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  project-mgmt-mcp:
    build:
      context: ../mcp_servers
      dockerfile: project_management_server/Dockerfile
    restart: unless-stopped
    ports:
      - "9002:8002"
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8002),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  calendar-mcp:
    build:
      context: ../mcp_servers
      dockerfile: calendar_server/Dockerfile
    restart: unless-stopped
    ports:
      - "9003:8003"
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8003),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # Override hostnames to use Docker Compose service names
      DATABASE_URL: postgresql+asyncpg://agent:agent_dev@postgres:5432/agent_db
      REDIS_URL: redis://redis:6379/0
      GITHUB_MCP_URL: http://github-mcp:8001
      PROJECT_MGMT_MCP_URL: http://project-mgmt-mcp:8002
      CALENDAR_MCP_URL: http://calendar-mcp:8003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      github-mcp:
        condition: service_healthy
      project-mgmt-mcp:
        condition: service_healthy
      calendar-mcp:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_URL: http://backend:8000
    env_file:
      - ../.env
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
