[alembic]
script_location = app/db/migrations
prepend_sys_path = .

# The database URL is loaded from the environment in env.py; this value
# is only a fallback placeholder.
sqlalchemy.url = postgresql+asyncpg://agent:agent_dev@localhost:5432/agent_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
